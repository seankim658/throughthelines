# [NCGA-453, AAR]
# SB 453: final floor votes 2011-07-27 (Senate concurred 28-17; House 3rd reading 68-51);
# ratified as SL 2011-403 on 2011-07-28.
enacted_date: 2011-07-28
# [AAR, DICKSON]
# DOJ preclearance under VRA Section 5 received 2011-11-01.
effective_date: 2011-11-01

# [NCGA-453, AAR]
origin: legislature
# [NCGA-453] SB 453 → SL 2011-403; named "Rucho-Lewis Congress 3"; sponsors Rucho/Brock/Brown.
# [AAR]      passed 2011-07-27; precleared 2011-11-01; used in 2012 + 2014 elections;
#            NC congressional plans not subject to gubernatorial veto (N.C. Const. art. II, § 22(5)).
origin_details: >-
  Enacted by the North Carolina General Assembly as Senate Bill 453, which became Session
  Law 2011-403 and is named "Rucho-Lewis Congress 3." The General Assembly passed the plan
  on July 27, 2011, and ratified it on July 28, 2011. It was precleared by the U.S.
  Department of Justice under Section 5 of the Voting Rights Act on November 1, 2011, and
  was used for the 2012 and 2014 U.S. House elections. North Carolina's congressional plans
  are drawn by the legislature and are not subject to gubernatorial veto.

# District numbers (1, 12) and the 14th-Amendment Equal Protection basis come from the
# opinions [HARRIS]/[COOPER].
struck_down: true
# [HARRIS] 2016-02-05: Districts 1 & 12 held unconstitutional racial gerrymanders (14A EP).
# [COOPER] 2017-05-22 affirmed: District 1 by 8-0 (Gorsuch took no part), District 12 by 5-3.
#          NOT 9-0 / "unanimous", only eight Justices participated.
struck_down_details: >-
  Partial, not plan-wide. On February 5, 2016, a three-judge panel of the U.S. District
  Court for the Middle District of North Carolina held that two of the state's congressional
  districts, District 1 and District 12, were unconstitutional racial gerrymanders under the
  Equal Protection Clause of the Fourteenth Amendment (Harris v. McCrory). The U.S. Supreme
  Court affirmed on May 22, 2017 (Cooper v. Harris), upholding the District 1 ruling by an
  8-0 vote (Justice Gorsuch took no part) and the District 12 ruling by a 5-3 vote. The
  remaining districts were not invalidated.
struck_down_districts: [1, 12]

# [AAR, NCGA]
# predecessor NC_108_2003 = 2001 "Congress ZeroDeviation" (HB 32 / SL 2001-479), 2002–2010 elections.
# superseded_by NC_115_2017 = 2016 remedial plan (SB 2 / SL 2016-1).
superseded_by: NC_115_2017
predecessor: NC_108_2003

# [DICKSON] state challenge that UPHELD the plan → context. Using Dickson I (367 N.C. 542 (2014));
#           other cites exist across its history (366 N.C. 332 (2013); 368 N.C. 481 (2015));
#           vacated/mooted after COOPER.
# [HARRIS]  federal panel, struck Districts 1 & 12 → invalidating. (parallel: 2016 WL 482052)
# [COOPER]  SCOTUS affirmance → affirming. (parallel: 137 S. Ct. 1455; 197 L. Ed. 2d 837)
# Excluded on purpose: Rucho v. Common Cause, 588 U.S. 684 (2019) is about the 2016 SUCCESSOR
#   (NC_115_2017) on PARTISAN grounds; it belongs in that file (mentioned in notes here only).
# TODO: add archived_url (Wayback) per citation (encouraged, not required for `curated`).
court_citations:
  - case: Dickson v. Rucho
    citation: "367 N.C. 542, 766 S.E.2d 238 (2014)"
    role: context
    url: https://law.justia.com/cases/north-carolina/supreme-court/2014/201pa12-2.html
  - case: Harris v. McCrory
    citation: "159 F. Supp. 3d 600 (M.D.N.C. 2016)"
    role: invalidating
    url: https://law.justia.com/cases/federal/district-courts/north-carolina/ncmdce/1:2013cv00949/64259/142/
  - case: Cooper v. Harris
    citation: "581 U.S. 285 (2017)"
    role: affirming
    url: https://www.supremecourt.gov/opinions/16pdf/15-1262_db8e.pdf

# [COOPER]        caption changed McCrory → Cooper (Gov. Cooper succeeded Gov. McCrory, Jan 2017).
# [NCGA-689, AAR] curative SB 689 / SL 2011-414 fixed a software coding error; did not alter the map.
notes: >-
  The racial-gerrymander invalidation of this plan is separate from the partisan-gerrymander
  litigation over its successor, the 2016 remedial plan (Senate Bill 2, Session Law 2016-1),
  which the U.S. Supreme Court addressed in Rucho v. Common Cause, 588 U.S. 684 (2019). The
  case caption changed from Harris v. McCrory at the district court to Cooper v. Harris at the
  Supreme Court after Roy Cooper succeeded Pat McCrory as Governor. A parallel state-court
  challenge, Dickson v. Rucho, upheld the 2011 districts before that judgment was vacated and
  mooted following Cooper v. Harris. A technical curative act (Senate Bill 689, Session Law
  2011-414) corrected a software coding error in the plan's textual block assignments in
  November 2011 but did not alter the map.

