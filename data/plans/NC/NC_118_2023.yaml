# [HARPER-ORDER, NCGA]
# Court-imposed plan; date is the panel's adoption order (Harper v. Hall, File No. 21 CVS 015426),
# entered 2022-02-23.
enacted_date: 2022-02-23
# [HARPER-ORDER, AAR]
# Court-ordered plan; took effect on adoption. No Section 5 preclearance (Shelby County v. Holder, 2013).
effective_date: 2022-02-23

# [HARPER-ORDER, AAR-MVH, NCGA]
origin: court
# [HARPER-ORDER] adopted by the Wake County Superior Court three-judge panel 2022-02-23; drawn with three
#                court-appointed special masters — former NC Supreme Court justices Robert Edmunds and
#                Robert Orr and former UNC System president Thomas Ross — and expert advisors.
# [HARPER-I]     enabling strike: NC Supreme Court struck the enacted 2021 plan (SB 740 / SL 2021-174) 2022-02-04.
# [AAR, NCGA]    panel rejected the legislature's remedial 2022 plan (SB 745 / SL 2022-3) 2022-02-23;
#                no preclearance (post-Shelby). Used only for the 2022 election.
origin_details: >-
  A court-imposed interim plan adopted by the Wake County Superior Court three-judge panel on
  February 23, 2022 and used only for the 2022 U.S. House election. It was drawn with the
  assistance of three court-appointed special masters — former North Carolina Supreme Court
  justices Robert Edmunds and Robert Orr and former UNC System president Thomas Ross — together
  with expert advisors. The panel adopted it after the North Carolina Supreme Court struck the
  General Assembly's enacted 2021 plan as an unconstitutional partisan gerrymander in Harper v.
  Hall, and after the panel rejected the legislature's remedial 2022 plan as still noncompliant.
  Because Shelby County v. Holder had ended Section 5 coverage, the plan required no federal
  preclearance.

# Interim by design — the court limited it to the 2022 election — then replaced through the ordinary
# cycle. Not struck down. The April 2023 reversal of Harper v. Hall and Moore v. Harper both followed
# the 2022 election and left this map undisturbed. [HARPER-ORDER, AAR-MVH]
struck_down: false
struck_down_details: >-
  This plan was not struck down. It was a court-imposed interim map, limited by the court to
  the 2022 election, and was replaced for 2024 by a plan the General Assembly enacted after the
  litigation concluded. The North Carolina Supreme Court's April 2023 reversal of Harper v.
  Hall, and the U.S. Supreme Court's decision in Moore v. Harper, both followed the 2022
  election and left this already-used interim map undisturbed.
struck_down_districts: []

# predecessor NC_117_2021 = 2019 plan (HB 1029 / SL 2019-249), used in the 2020 election. The enacted 2021
#   plan (SB 740 / SL 2021-174, struck in Harper v. Hall) and the rejected 2022 remedial plan (SB 745 /
#   SL 2022-3) were never used in an election, so the election-sequence predecessor is the 2019 plan.
# superseded_by NC_119_2025 = 2023 plan (SB 757 / SL 2023-145, enacted 2023-10-25), used in the 2024 election.
superseded_by: NC_119_2025
predecessor: NC_117_2021

# [HARPER-I]     Harper v. Hall (N.C. Sup. Ct., 2022-02-04) → enabling: struck the enacted 2021 plan
#                (SB 740 / SL 2021-174), triggering this remedy (4-3; NC Const. Free Elections / Equal
#                Protection / Free Speech / Assembly clauses).
# [HARPER-ORDER] Harper v. Hall remedial order (Wake Cty. three-judge panel, 2022-02-23) → remedial:
#                the order that imposed THIS interim plan; unpublished, File No. 21 CVS 015426.
# [MOORE]        Moore v. Harper (U.S., 2023-06-27) → context: rejected the independent-state-legislature
#                theory; a judicial-authority ruling that did not invalidate or uphold this map (6-3).
# Harper v. Hall was later reversed on rehearing (384 N.C. 292, 886 S.E.2d 393, 2023-04-28), after the
#   2022 election; that reversal did not disturb this already-used map and is noted in `notes`.
# TODO: add archived_url (Wayback) per citation.
court_citations:
  - case: Harper v. Hall
    citation: "380 N.C. 317, 868 S.E.2d 499 (2022)"
    role: enabling
    url: https://caselaw.findlaw.com/court/nc-supreme-court/2098995.html
  - case: Harper v. Hall (remedial order)
    citation: "No. 21 CVS 015426 (N.C. Super. Ct., Wake Cnty. Feb. 23, 2022)"
    role: remedial
    url: https://redistricting.lls.edu/case/moore-v-harper/
  - case: Moore v. Harper
    citation: "600 U.S. 1 (2023)"
    role: context
    url: https://www.supremecourt.gov/opinions/22pdf/21-1271_3f14.pdf

# 2022 result: 7 R – 7 D (public election results).
notes: >-
  This is the only court-drawn congressional map in North Carolina's history within this
  dataset's window, and it produced an even 7–7 split among the state's fourteen seats in the
  2022 election. The litigation that produced it continued after that election: the North
  Carolina Supreme Court, with a changed composition, reversed Harper v. Hall on April 28, 2023
  and held partisan-gerrymandering claims nonjusticiable under the state constitution, and the
  U.S. Supreme Court in Moore v. Harper rejected the independent-state-legislature theory.
  Neither disturbed this interim map; together they shaped the 2023 plan that replaced it.

