notes: >-
  This is North Carolina's first mid-decade congressional change of the 2020s cycle and the first
  plan in this dataset sourced outside the Lewis archive. Because the Census Bureau publishes no
  block-equivalency file for a map drawn off the decennial cycle, the address-to-district lookup is
  built from the General Assembly's own block assignment file, exactly as it is for the 2019
  remedial plan that governs the 117th Congress. The redraw is projected to move the delegation from
  10-4 to 11-3 Republican by reworking the eastern districts, with District 1 (the state's one
  competitive U.S. House seat in 2024) becoming substantially more Republican. The plan governs the
  120th Congress and is the map voters use in 2026, although that Congress is not seated until
  January 2027; the 119th Congress's members, elected in 2024, hold office until then.
