# [NCGA-249, AAR]
origin: legislature
# [NCGA-249] SB 249 -> SL 2025-95; "Realign Congressional Districts 2025"; primary
#            sponsors Alexander, Daniel, Galey; amends G.S. 163-201; 2020-census-block based.
# [AAR]      voluntary mid-decade partisan redraw; reworked Districts 1 and 3 in eastern NC;
#            NC congressional plans not subject to gubernatorial veto (N.C. Const. art. II, § 22(5)).
origin_details: >-
  Enacted by the Republican-controlled North Carolina General Assembly as Senate Bill 249,
  which became Session Law 2025-95 under the short title "Realign Congressional Districts 2025."
  Unlike a post-census plan, this was a voluntary mid-decade redraw: the General Assembly
  reopened the 2023 map roughly two years into the decade to add an expected Republican seat,
  reconfiguring Districts 1 and 3 in the eastern part of the state. The Senate passed it on
  party lines (25-20 on second reading October 20 and 26-20 on third reading October 21, 2025),
  and the House gave final approval 66-48 on October 22, 2025, at which point it took effect,
  because North Carolina's congressional plans are not subject to gubernatorial veto. It is drawn
  on 2020 census tabulation blocks, the same vintage as the 2023 plan it replaced.

# Not struck down; in effect for 2026. PI denied 2025-11-26; remaining 2025-plan challenge
# voluntarily dismissed with prejudice 2026-01-16; no appeal. [WILLIAMS, AAR-WVH]
struck_down: false
# [WILLIAMS] 2025-11-26: three-judge M.D.N.C. panel unanimously denied a preliminary injunction
#            against the 2025 plan, finding plaintiffs unlikely to succeed and that the direct
#            evidence showed partisan, not racial, motivation. 2026-01-16: plaintiffs voluntarily
#            dismissed the remaining 2025-plan claims with prejudice (Doc. 221, FRCP 41(a)(1)).
struck_down_details: >-
  This plan was not struck down and is in effect for the 2026 election. It was challenged in the
  consolidated three-judge case Williams v. Hall in the Middle District of North Carolina by the
  same plaintiffs who had challenged the 2023 plan, who added claims that the 2025 redraw
  intentionally diluted Black voting strength. On November 26, 2025, the panel unanimously denied
  a preliminary injunction, finding the plaintiffs unlikely to succeed on the merits and
  concluding that the direct evidence pointed to a partisan rather than a racial motivation. The
  plaintiffs then voluntarily dismissed their remaining challenge to the 2025 plan with prejudice
  on January 16, 2026, which forecloses refiling, and took no appeal. No challenge to this plan is
  active.
struck_down_districts: []

