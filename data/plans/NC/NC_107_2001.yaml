notes: >-
  This record models North Carolina's 1997 congressional plan ("97 House/Senate Plan A," House Bill
  586 / Session Law 1997-11), the 12-district map in legal effect at the start of the 107th
  Congress. It governed the November 2000 election because the 1998 plan (Session Law 1998-2)
  contained a reversion proviso that restored the 1997 plan after the U.S. Supreme Court ruled for
  the State in Hunt v. Cromartie (1999), and a Supreme Court stay kept the 1997 plan in use for the
  2000 election despite a March 2000 district-court invalidation later reversed in Easley v.
  Cromartie (2001). The plan sits in the Shaw v. Reno line of racial-gerrymandering litigation over
  the 12th District; the deeper predecessor is the 1992 plan whose 12th District was struck in Shaw
  v. Hunt. Data-vintage note: the source polygons (Lewis's North Carolina_107_to_107.geojson) are
  this 1990s-era plan joined in the pipeline against 2000 Census blocks, producing a thin boundary
  seam for a small number of addresses.

