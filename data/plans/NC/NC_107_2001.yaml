# [NCGA-586, CROMARTIE-00]
# HB 586 ratified as SL 1997-11 on 1997-03-31 ("97 House/Senate Plan A"); a remedial plan after
# Shaw v. Hunt struck the 1992 District 12. (Cromartie recites enactment "on March 31, 1997.")
enacted_date: 1997-03-31
# [AAR, MNSEN]
# NC was a partial Section 5 jurisdiction (40 of 100 counties); the 1997 plan was precleared in
# 1997, but no primary source gives the exact DOJ preclearance date -> unknown. (The 1997-09-12
# three-judge-panel approval is a related milestone, not the preclearance date.)
effective_date: unknown

# [NCGA-586, AAR]
origin: legislature
# [NCGA-586] HB 586 -> SL 1997-11; "97 House/Senate Plan A"; legislature-drawn remedial map.
# [SHAW-II]  drawn to replace the 1992 District 12 struck in Shaw v. Hunt (1996).
# [AAR]      retained a majority-Black District 1; NC congressional plans not subject to
#            gubernatorial veto (N.C. Const. art. II, § 22(5)).
origin_details: >-
  Enacted by the North Carolina General Assembly as House Bill 586, which became Session Law
  1997-11 and is named "97 House/Senate Plan A." It was a remedial congressional plan drawn after
  the U.S. Supreme Court held the 1992 plan's 12th District an unconstitutional racial gerrymander
  in Shaw v. Hunt (1996); the 1997 plan reshaped the 12th District while retaining a majority-Black
  1st District. Ratified on March 31, 1997 and precleared under Section 5 of the Voting Rights Act,
  it was the plan in legal effect for the November 2000 U.S. House election that seated the 107th
  Congress. North Carolina's congressional plans are drawn by the legislature and are not subject
  to gubernatorial veto.

# Used in the 2000 election and never struck by a ruling that stood; the District 12 invalidation
# was stayed and then reversed. [CROMARTIE-00, EASLEY]
struck_down: false
# [CROMARTIE-00] 2000-03-07: three-judge E.D.N.C. court (2-1) again struck District 12 as a racial
#                gerrymander after trial; District 1 upheld. STAYED by SCOTUS (529 U.S. 1014 (2000)),
#                so the plan was used in Nov 2000, then REVERSED by [EASLEY].
# [HUNT-99]      1999-05-17: SCOTUS reversed the earlier summary-judgment invalidation; this triggered
#                the 1998 plan's reversion proviso and restored this 1997 plan.
# [EASLEY]       2001-04-18 (5-4): District 12 upheld as predominantly political, not racial.
struck_down_details: >-
  This plan was not struck down. Its 12th District was challenged as a racial gerrymander
  throughout the late 1990s, and a three-judge federal court invalidated it twice. The first time on
  summary judgment, reversed by the U.S. Supreme Court in Hunt v. Cromartie (1999), and again after
  trial on March 7, 2000. The Supreme Court stayed the March 2000 order, allowing the plan to be
  used in the November 2000 election, and then reversed it in Easley v. Cromartie (2001), holding
  that the 12th District was drawn predominantly on political rather than racial grounds. The 1st
  District was challenged but upheld. No adverse ruling against the plan stood.
struck_down_districts: []

# superseded_by NC_108_2003 = 2001 plan "Congress ZeroDeviation" (HB 32 / SL 2001-479), which added
#   the 13th district and was first used in 2002.
# predecessor NC_106_1999 = 1998 plan (HB 1394 / SL 1998-2), used for the 1998 election. NOTE the
#   election-sequence quirk: the 1998 plan was enacted AFTER this 1997 plan but governed the EARLIER
#   (1998) election; this 1997 plan was restored by reversion for 2000. The chain is by election, not
#   enactment date. [NCGA, CROMARTIE-00]
superseded_by: NC_108_2003
predecessor: NC_106_1999

# Roles are relative to THIS (1997) plan:
# [SHAW-II]      Shaw v. Hunt (1996) -> enabling: struck the 1992 District 12, prompting this remedial plan.
# [HUNT-99]      Hunt v. Cromartie (1999) -> context: reversed the first invalidation of this plan's
#                District 12 and triggered its reversion back into effect.
# [CROMARTIE-00] Cromartie v. Hunt (E.D.N.C. 2000) -> context: struck District 12 after trial, but the
#                order was stayed (529 U.S. 1014) and reversed by [EASLEY] -> did not stand.
# [EASLEY]       Easley v. Cromartie (2001) -> context: reversed the 2000 invalidation; upheld District 12.
# Excluded on purpose: Shaw v. Reno, 509 U.S. 630 (1993) established the racial-gerrymander doctrine
#   but concerned the 1992 plan -> deeper-predecessor context, noted below.
