notes: >-
  This plan governed the 119th Congress and produced a 10-4 Republican delegation in the 2024
  election, a shift from the even 7-7 split under the 2022 court-drawn interim plan it replaced.
  It was enabled by the North Carolina Supreme Court's April 28, 2023 reversal in Harper v. Hall,
  which ended the state-constitutional bar on partisan gerrymandering, and it was upheld on the
  merits against racial-gerrymandering and Voting Rights Act challenges in Williams v. Hall on
  November 20, 2025. Before that ruling, the General Assembly had already replaced this plan
  mid-decade with a 2025 congressional plan (Senate Bill 249, Session Law 2025-95, ratified
  October 22, 2025), which reconfigured Districts 1 and 3 to favor Republicans and was projected
  to yield an 11-3 delegation for the 2026 election. 

