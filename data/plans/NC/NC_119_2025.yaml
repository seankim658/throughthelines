# [NCGA-757]
# SB 757: Senate 3rd reading 2023-10-24 (28-18); House 2nd/3rd reading 2023-10-25 (64-40);
# ratified and chaptered as SL 2023-145 on 2023-10-25.
enacted_date: 2023-10-25
# [NCGA-757, AAR]
# No Section 5 preclearance required (Shelby County v. Holder, 2013); took effect on enactment,
# so effective_date coincides with enacted_date.
effective_date: 2023-10-25

# [NCGA-757, AAR]
origin: legislature
# [NCGA-757]   SB 757 -> SL 2023-145; designated "Realign Congressional Districts 2023" / CST-4;
#              primary sponsors Hise, Daniel, P. Newton; based on 2020 census blocks (amends G.S. 163-201).
# [HARPER-III] enabling reversal: NC Supreme Court held partisan gerrymandering nonjusticiable under
#              the state constitution 2023-04-28, remanding for the General Assembly to enact new plans.
# [AAR]        replaced the 2022 court-drawn interim plan; used in 2024 (10-4 R delegation);
#              NC congressional plans not subject to gubernatorial veto (N.C. Const. art. II, § 22(5)).
origin_details: >-
  Enacted by the Republican-controlled North Carolina General Assembly as Senate Bill 757,
  which became Session Law 2023-145 and is designated "Realign Congressional Districts 2023"
  (plan CST-4). The General Assembly drew it as the post-2020-census congressional plan after
  the North Carolina Supreme Court, with a newly elected Republican majority, reversed its
  earlier decision in Harper v. Hall on April 28, 2023 and held that partisan-gerrymandering
  claims are nonjusticiable under the North Carolina Constitution, remanding for the General
  Assembly to enact new districts. Ratified on October 25, 2023, it replaced the 2022
  court-drawn interim map and was used for the 2024 U.S. House election, producing a 10-4
  Republican delegation. Because Shelby County v. Holder had ended Section 5 coverage, the plan
  required no federal preclearance, and North Carolina's congressional plans are not subject to
  gubernatorial veto.

# Used in 2024 and never enjoined; the consolidated federal challenge was rejected on the merits.
# The District 1 challenge was not reached because the 2025 mid-decade plan had already replaced
# that configuration; residual claims dismissed with prejudice 2026-01-16. [WILLIAMS, AAR-WVH]
struck_down: false
# [WILLIAMS] 2025-11-20: three-judge M.D.N.C. panel unanimously rejected 14A / 15A and VRA
#            intentional-dilution claims after a six-day trial; found no racial discriminatory
#            purpose and that racial data was not used. CD1-as-2023 not reached (superseded by 2025 map).
struck_down_details: >-
  This plan was not struck down. It was used for the 2024 U.S. House election and was never
  enjoined. A consolidated federal challenge (Williams v. Hall, with North Carolina State
  Conference of the NAACP v. Berger) alleged that the 2023 congressional and state Senate
  districts intentionally diluted Black voting strength in violation of the Fourteenth and
  Fifteenth Amendments and the Voting Rights Act. After a six-day trial, a three-judge panel of
  the U.S. District Court for the Middle District of North Carolina unanimously rejected those
  claims on November 20, 2025, finding that the General Assembly did not draw the districts with
  a racially discriminatory purpose and did not use racial data. The panel did not reach the
  challenge to District 1 as configured in 2023 because the General Assembly's October 2025
  mid-decade plan had already replaced that configuration; the residual claims were voluntarily
  dismissed with prejudice on January 16, 2026.
struck_down_districts: []

