# [NCGA-SB2]
# 2016 First Extra Session. Senate vote 2016-02-18 (32-15); House vote 2016-02-19 (65-43);
# ratified and chaptered as SL 2016-1 on 2016-02-19.
enacted_date: 2016-02-19
# [NCGA-SB2, AAR]
# No Section 5 preclearance required (Shelby County v. Holder, 2013, ended coverage);
# took effect on enactment.
effective_date: 2016-02-19

# [NCGA-SB2, AAR]
origin: legislature
# [NCGA-SB2]  SB 2 → SL 2016-1; 2016 First Extra Session; primary sponsor Rucho.
# [NCGA-PROC] plan name "2016 Contingent Congressional Plan – Corrected"; committee adoption 2016-02-17/18.
# [HARRIS]    remedial trigger: 2011 Districts 1 & 12 struck 2016-02-05; new map ordered within two weeks.
# [AAR]       not subject to gubernatorial veto (N.C. Const. art. II, § 22(5)); used in 2016 + 2018 elections.
origin_details: >-
  Drawn and enacted by the North Carolina General Assembly as Senate Bill 2, which became
  Session Law 2016-1, in the 2016 First Extra Session, and named the "2016 Contingent
  Congressional Plan – Corrected." It was enacted as a court-ordered remedy after the
  federal court in Harris v. McCrory struck two districts of the 2011 plan as racial
  gerrymanders and ordered a new map within two weeks. Because Shelby County v. Holder had
  ended Section 5 coverage, the plan was not precleared. North Carolina's congressional
  plans are drawn by the legislature and are not subject to gubernatorial veto. It was used
  for the 2016 and 2018 U.S. House elections.

# Plan-wide partisan-gerrymander challenge (no individual districts) → struck_down_districts: [].
struck_down: true
# [RUCHO]  M.D.N.C. three-judge panel held it an unconstitutional partisan gerrymander
#          (318 F. Supp. 3d 777, M.D.N.C. 2018); SCOTUS vacated 2019-06-27 (5-4) — partisan-
#          gerrymander claims nonjusticiable in federal court.
# [HARPER] Wake County three-judge panel preliminarily enjoined the plan 2019-10-28 under the
#          NC Constitution (Free Elections / Equal Protection / Free Speech / Assembly clauses);
#          replaced by SL 2019-249 (Nov 2019); no final state judgment entered.
struck_down_details: >-
  The plan was challenged as a partisan gerrymander on two tracks. In federal court, a
  three-judge panel held it an unconstitutional partisan gerrymander, but the U.S. Supreme
  Court vacated that ruling in Rucho v. Common Cause on June 27, 2019, holding that
  partisan-gerrymandering claims are nonjusticiable in federal court, so the federal courts
  did not invalidate the plan. In state court, a three-judge panel of the Wake County
  Superior Court preliminarily enjoined the plan on October 28, 2019 in Harper v. Lewis,
  finding it a likely partisan gerrymander under the North Carolina Constitution. The
  General Assembly enacted a replacement plan the following month, and the state challenge
  was not carried to a final judgment. The challenge was to the plan statewide rather than
  to specific districts.
struck_down_districts: []

# predecessor NC_113_2013 = 2011 "Rucho-Lewis Congress 3" (SB 453 / SL 2011-403); its Districts 1 & 12
#   were struck in Harris v. McCrory, which compelled this remedial plan.
# superseded_by NC_117_2021 = 2019 Congressional Plan (HB 1029 / SL 2019-249, 2019-11-15), used in 2020.
superseded_by: NC_117_2021
predecessor: NC_113_2013

# [HARRIS] Harris v. McCrory → enabling: the order that compelled this remedial plan.
# [RUCHO]  Rucho v. Common Cause (SCOTUS) → context: vacated the M.D.N.C. partisan-gerrymander ruling
#          (318 F. Supp. 3d 777) on nonjusticiability; did not invalidate the plan. (parallel: 139 S. Ct. 2484)
# [HARPER] Harper v. Lewis → invalidating: state preliminary injunction; unpublished order.
# Not included: Common Cause v. Lewis (No. 18-CVS-14001, 2019-09-03) struck NC's STATE LEGISLATIVE maps,
#   not this congressional plan; the congressional analog is Harper v. Lewis.
