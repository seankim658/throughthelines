# [RUCHO] (quoting the M.D.N.C. record, 318 F. Supp. 3d 777, 808–809): Lewis's 10–3 partisan-advantage statement.
notes: >-
  The partisan intent was openly stated during drawing. Representative David Lewis told the
  joint redistricting committee that he proposed a map giving "a partisan advantage to 10
  Republicans and 3 Democrats" because he did not believe an 11–2 Republican map was
  achievable. The U.S. Supreme Court case most associated with this plan, Rucho v. Common
  Cause, concerned it but did not strike it down; the operative invalidation was the state
  court's preliminary injunction in Harper v. Lewis.

