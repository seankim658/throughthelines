# [NCGA-32, SL-479]
# HB 32: House concurred in the Senate committee substitute 2001-12-05 (64-43); Senate 2nd/3rd
# reading 2001-12-04 (30-13); ratified and chaptered as SL 2001-479 on 2001-12-05. SL 2001-479 § 1
# repealed the earlier SL 2001-471 (HB 1477, ratified 2001-11-28).
enacted_date: 2001-12-05
# [AAR]
# Precleared under VRA Section 5 on 2002-02-15 (NC had 40 covered counties pre-Shelby). Date per AAR,
# corroborated by the American Redistricting Project; primary DOJ letter not located, and the date may
# be conflated with the 2002-02 Stephenson state-court timeline (the 2001 LEGISLATIVE plans were
# precleared 2002-02-11 per Stephenson I). Verify against the DOJ Voting Section file / NC Register.
effective_date: 2002-02-15

# [NCGA-32, AAR]
origin: legislature
# [NCGA-32] HB 32 -> SL 2001-479; named "Congress ZeroDeviation"; primary sponsor Goodwin
#           (co-sponsors Dedmon, Justus, Shubert); added the 13th district after the 2000 census.
# [AAR]     Democratic-controlled General Assembly; precleared 2002-02-15; used 2002-2010;
#           NC congressional plans not subject to gubernatorial veto (N.C. Const. art. II, § 22(5)).
origin_details: >-
  Enacted by the Democratic-controlled North Carolina General Assembly as House Bill 32, which
  became Session Law 2001-479 and is named "Congress ZeroDeviation." It was the post-2000-census
  congressional plan, expanding North Carolina from twelve to thirteen districts after the state
  gained a seat in reapportionment, and it created a new 13th District in the northern Piedmont.
  The plan was ratified on December 5, 2001, precleared under Section 5 of the Voting Rights Act,
  and used for the 2002, 2004, 2006, 2008, and 2010 U.S. House elections. North Carolina's
  congressional plans are drawn by the legislature and are not subject to gubernatorial veto.

# Used across five elections (2002-2010) and replaced by ordinary decennial redistricting; never
# enjoined or invalidated. Stephenson v. Bartlett struck only the 2001 LEGISLATIVE plans. [AAR, STEPHENSON]
struck_down: false
# [STEPHENSON] struck NC's 2001 state Senate/House plans (Whole County Provisions); not the CD plan.
# [AAR]        "It appears that this plan was not challenged in court."
struck_down_details: >-
  This plan was not struck down. It governed five consecutive U.S. House elections (2002 through
  2010) and was replaced by ordinary decennial redistricting after the 2010 census; it does not
  appear to have been challenged in court. The contemporaneous Stephenson v. Bartlett litigation
  invalidated only North Carolina's 2001 state legislative plans, under the state constitution's
  Whole County Provisions, which do not apply to congressional districts, and did not concern this
  congressional plan.
struck_down_districts: []
# predecessor NC_107_2001 = 1990s-era plan in force for the 2000 election (107th Congress), a
#   12-district map predating the 13th seat added here. [NCGA, AAR]
# superseded_by NC_113_2013 = 2011 plan "Rucho-Lewis Congress 3" (SB 453 / SL 2011-403,
#   ratified 2011-07-28), first used in 2012. [NCGA]
superseded_by: NC_113_2013
predecessor: NC_107_2001

# [STEPHENSON] Stephenson v. Bartlett (N.C., 2002) -> context: struck NC's 2001 state LEGISLATIVE
#              plans under the Whole County Provisions; did NOT concern this congressional plan.
#              Using Stephenson I (355 N.C. 354 (2002)); follow-on Stephenson II (357 N.C. 301 (2003)).
# Excluded on purpose: Easley v. Cromartie, 532 U.S. 234 (2001) resolved the 1990s 12th-district
#   litigation over the PREDECESSOR plan -> belongs in NC_107_2001's file. Harris v. McCrory /
#   Cooper v. Harris cite this plan only as a benchmark for the 2011 SUCCESSOR -> NC_113_2013's file.
court_citations:
  - case: Stephenson v. Bartlett
    citation: "355 N.C. 354, 562 S.E.2d 377 (2002)"
    role: context
    url: https://law.justia.com/cases/north-carolina/supreme-court/2002/094-02-1.html
    archived_url: https://web.archive.org/web/20241106025213/https://law.justia.com/cases/north-carolina/supreme-court/2002/094-02-1.html

notes: >-
  This plan added North Carolina's 13th congressional district following the 2000 census and was
  drawn by the Democratic-controlled General Assembly; Democrats held seven of the thirteen seats
  from 2002 through 2008 and six of thirteen in 2010. An earlier 2001 congressional act (House Bill
  1477, Session Law 2001-471, ratified November 28, 2001) was expressly repealed one week later by
  Session Law 2001-479, so House Bill 32 / Session Law 2001-479 is the operative, election-governing
  plan. The plan was replaced by ordinary decennial redistricting after the 2010 census with the
  2011 "Rucho-Lewis Congress 3" plan (Senate Bill 453, Session Law 2011-403).

