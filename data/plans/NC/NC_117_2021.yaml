# [NCGA-H1029]
# HB 1029: House vote 2019-11-14 (55-46); Senate 2nd/3rd readings 2019-11-15 (24-17);
# ratified and chaptered as SL 2019-249 on 2019-11-15.
enacted_date: 2019-11-15
# [NCGA-H1029, AAR]
# No Section 5 preclearance required (Shelby County v. Holder, 2013, ended coverage);
# took effect on enactment.
effective_date: 2019-11-15

# [NCGA-H1029, AAR]
origin: legislature
# [NCGA-H1029] HB 1029 → SL 2019-249; sponsors Lewis, D. Hall; amends G.S. 163-201.
# [HARPER]     remedial trigger: 2016 plan preliminarily enjoined 2019-10-28; GA invited to enact a remedy.
# [AAR]        drawn by the Joint Select Committee in public, livestreamed sessions; the court allowed it to
#              govern the 2020 elections; not subject to gubernatorial veto (N.C. Const. art. II, § 22(5)).
origin_details: >-
  Drawn and enacted by the North Carolina General Assembly as House Bill 1029, which became
  Session Law 2019-249, as a remedy after a state court preliminarily enjoined the prior 2016
  plan in Harper v. Lewis as a likely partisan gerrymander under the North Carolina
  Constitution. The Joint Select Committee on Congressional Redistricting drew the map in
  public, livestreamed committee sessions, adopting criteria that barred the use of election
  and racial data. Because Shelby County v. Holder had ended Section 5 coverage, the plan was
  not precleared, and North Carolina's congressional plans are not subject to gubernatorial
  veto. It was used only for the 2020 U.S. House election and was then replaced through the
  ordinary redistricting cycle that followed the 2020 census.

# Never invalidated. On 2019-12-02 the Harper v. Lewis panel declined to enjoin this plan and
# lifted the candidate-filing stay so the 2020 elections could proceed; it did NOT rule on the
# plan's constitutionality (taking that, and mootness, under advisement). The plan ended by
# ordinary decennial (2020 census) replacement, not by any court ruling. [HARPER, AAR]
struck_down: false
struck_down_details: >-
  This plan was not struck down. It was enacted as a remedy, used for the 2020 U.S. House
  election, and then replaced through the ordinary redistricting cycle that followed the 2020
  census. In Harper v. Lewis, the state court that had enjoined the predecessor plan declined
  on December 2, 2019 to enjoin this remedial plan and allowed the 2020 elections to proceed
  under it, without ruling on its constitutionality.
struck_down_districts: []

# predecessor NC_115_2017 = 2016 plan (SB 2 / SL 2016-1); preliminarily enjoined in Harper v. Lewis,
#   which compelled this remedial plan.
# superseded_by NC_118_2023 = the plan used for the 2022 election (118th Congress), reached through the
#   post-2020-census cycle. The 2021 enacted plan (SB 740 / SL 2021-174) was struck in Harper v. Hall and
#   the 2022 election ran on a court-drawn interim plan; that successor's litigation belongs to its own file.
superseded_by: NC_118_2023
predecessor: NC_115_2017

# [HARPER] Harper v. Lewis → enabling: the preliminary injunction against the 2016 plan compelled this
#          remedy; on 2019-12-02 the same panel declined to enjoin this plan (no merits ruling).
#          Unpublished orders, No. 19-CVS-012667 (N.C. Super. Ct., Wake Cnty.).
# Not included: Harper v. Hall (868 S.E.2d 499, N.C. 2022) and Moore v. Harper (600 U.S. 1, 2023) concern
#   the LATER 2021 plan (SL 2021-174), not this plan; they belong in the successor's file.
court_citations:
  - case: Harper v. Lewis
    citation: "No. 19-CVS-012667 (N.C. Super. Ct., Wake Cnty. Dec. 2, 2019)"
    role: enabling
    url: https://redistricting.lls.edu/case/harper-v-lewis/
    archived_url: https://web.archive.org/web/20260427230051/https://redistricting.lls.edu/case/harper-v-lewis/

# [AAR] 2020 election ran 8 R - 5 D, narrowing the prior 10-3 Republican delegation.
notes: >-
  This plan was North Carolina's only congressional map used for a single election in the
  2010s, governing the 117th Congress alone. It was drawn in an unusually public process, in
  livestreamed committee sessions and under criteria that excluded election and racial data,
  in response to the Harper v. Lewis injunction against the prior plan.
