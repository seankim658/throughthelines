# Configuration for upstream data sources.
#
# This file is the single source of truth for WHAT to fetch and from WHERE.
# The fetch pipeline reads it, downloads the listed files to data/raw/,
# and writes a manifest recording the bytes it actually got.
#
# Versioning:
#   - lewis.commit_sha : a git commit SHA on master. Once pinned, the
#     raw URLs built from this config are immutable.
#   - voteview does not expose a strong version identifier; we record
#     the ETag (or Last-Modified) returned at fetch time in the manifest.

schema_version = 1

[lewis]
# Jeffrey Lewis's congressional-district-boundaries repo.
# https://github.com/JeffreyBLewis/congressional-district-boundaries
# Filenames carry Lewis's upstream naming convention (literal 
# spaces, mixed case).
repo = "JeffreyBLewis/congressional-district-boundaries"
commit_sha = "f107b1b6c149c1b759cbb9b5bb14111a2355d6a1"
landing_url = "https://github.com/JeffreyBLewis/congressional-district-boundaries"
homepage = "https://cdmaps.polisci.ucla.edu/"

[lewis.states.NC]
files = [
    "GeoJson/North Carolina_103_to_105.geojson",
    "GeoJson/North Carolina_106_to_106.geojson",
    "GeoJson/North Carolina_107_to_107.geojson",
    "GeoJson/North Carolina_108_to_112.geojson",
    "GeoJson/North Carolina_113_to_114.geojson",
    "GeoJson/North Carolina_115_to_116.geojson",
    "GeoJson/North Carolina_117_to_117.geojson",
    "GeoJson/North Carolina_118_to_118.geojson",
    "GeoJson/North Carolina_119_to_119.geojson",
]

[voteview]
# Voteview's member-level data (HSall = all House members across all Congresses).
url = "https://voteview.com/static/data/out/members/HSall_members.csv"
landing_url = "https://voteview.com/data"

[census]
# Census Bureau resources for the block-lookup pipeline.

# --- Tabulation block shapefiles, per decade ---

[census.tabblock.v2020]
# 2020-Census blocks. State-level zip nested under STATE/{fips}_{name_upper}/{fips}/
url_template = "https://www2.census.gov/geo/tiger/TIGER2020PL/STATE/{fips}_{name_upper}/{fips}/tl_2020_{fips}_tabblock20.zip"

[census.tabblock.v2010]
# 2010-Census blocks (TIGER 2010 vintage release). Flat directory, state-level rollup.
url_template = "https://www2.census.gov/geo/tiger/TIGER2010/TABBLOCK/2010/tl_2010_{fips}_tabblock10.zip"

[census.tabblock.v2000]
# 2000-Census blocks repackaged in the TIGER 2010 vintage release.
# Note: tl_2010_ prefix is the release vintage; _tabblock00 suffix is the
# block geometry vintage. Confusing but correct.
url_template = "https://www2.census.gov/geo/tiger/TIGER2010/TABBLOCK/2000/tl_2010_{fips}_tabblock00.zip"

# --- Block Equivalency Files ---
# 
# Each entry maps Census tabulation blocks of `vintage` to district numbers under one Congress's plan.
# 
# Resolution: for (state, congress), the builder prefers a state-specific entry (state = "NC") over a 
# national one (state = "*"). This lets a state authority's file override an absent or missing Census 
# BEF without flag wrangling.
# 
# Provider naming convention: lowercase short label for the publishing authority. Examples: "census", 
# "ncga". For future state authorities prefer the abbreviation contributors will recognize (e.g. "pa_lrc" 
# for the PA Legislative Reapportionment Commission).
# 
# Census BEF URL pattern note: the 119th release uses directory "119-congressional-district-befs" (plural), 
# older releases use the singular "...-bef".
#
# Census BEF coverage gap: the Census Redistricting Data Program does not collect boundaries for the Congress 
# whose elections align with the decennial census, so there is no 117th Census BEF. For NC, the 117th entry below 
# points at the NC General Assembly's block assignment file for the 2019-enacted congressional plan (HB 1029, SL 2019-249), 
# which was used for the 2020 election. For the other 49 states, the 116th BEF data is identical to the 117th and is carried 
# forward by build-time logic; no per-state 117th entry is required.
# Source: https://www.census.gov/programs-surveys/decennial-census/about/rdo/congressional-districts.117th_Congress.html

[[block_assignment]]
provider = "census"
state = "*"
congress = 113
vintage = "v2010"
landing_url = "https://www.census.gov/geographies/mapping-files/2013/dec/rdo/113-congressional-district-bef.html"
url = "https://www2.census.gov/programs-surveys/decennial/rdo/mapping-files/2013/113-congressional-district-bef/cd113.zip"
inner_filename = "National_CD113.txt"
district_column = "CD113"

[[block_assignment]]
provider = "census"
state = "*"
congress = 114
vintage = "v2010"
landing_url = "https://www.census.gov/geographies/mapping-files/2015/dec/rdo/114-congressional-district-bef.html"
url = "https://www2.census.gov/programs-surveys/decennial/rdo/mapping-files/2015/114-congressional-district-bef/cd114.zip"
inner_filename = "National_CD114.txt"
district_column = "CD114"

[[block_assignment]]
provider = "census"
state = "*"
congress = 115
vintage = "v2010"
landing_url = "https://www.census.gov/geographies/mapping-files/2017/dec/rdo/115-congressional-district-bef.html"
url = "https://www2.census.gov/programs-surveys/decennial/rdo/mapping-files/2017/115-congressional-district-bef/cd115.zip"
inner_filename = "National_CD115.txt"
district_column = "CD115"

[[block_assignment]]
provider = "census"
state = "*"
congress = 116
vintage = "v2010"
landing_url = "https://www.census.gov/geographies/mapping-files/2019/dec/rdo/116-congressional-district-bef.html"
url = "https://www2.census.gov/programs-surveys/decennial/rdo/mapping-files/2019/116-congressional-district-bef/cd116.zip"
inner_filename = "National_CD116.txt"
district_column = "CD116"

[[block_assignment]]
provider = "ncga"
state = "NC"
congress = 117
vintage = "v2010"
landing_url = "https://www.ncleg.gov/Redistricting"
url = "https://www.ncleg.gov/Files/GIS/Plans_Main/Congress_2019/HB1029%203rd%20Edition%20-%20Blockfile.zip"
inner_filename = "C-Goodwin-A-1-TC.csv"
district_column = "District"
geoid_column = "Block"

[[block_assignment]]
provider = "census"
state = "*"
congress = 118
vintage = "v2020"
landing_url = "https://www.census.gov/geographies/mapping-files/2023/dec/rdo/118-congressional-district-bef.html"
url = "https://www2.census.gov/programs-surveys/decennial/rdo/mapping-files/2023/118-congressional-district-bef/cd118.zip"
inner_filename = "National_CD118.txt"
district_column = "CDFP"

[[block_assignment]]
provider = "census"
state = "*"
congress = 119
vintage = "v2020"
landing_url = "https://www.census.gov/geographies/mapping-files/2025/dec/rdo/119-congressional-district-befs/"
url = "https://www2.census.gov/programs-surveys/decennial/rdo/mapping-files/2025/119-congressional-district-befs/cd119.zip"
inner_filename = "NationalCD119.txt"
district_column = "CDFP"

# --- Protomaps basemap ---

[protomaps_basemap]
# Browse builds: https://maps.protomaps.com/builds
build_url = "https://build.protomaps.com/20260518.pmtiles" # Don't visit this directly
landing_url = "https://maps.protomaps.com/builds"
max_zoom = 12
# Buffer applied around each state's bounding box.
bbox = [-125.0, 24.3, -66.9, 49.4]
