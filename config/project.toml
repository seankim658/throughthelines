schema_version = 1

[project]
name = "Through the Lines"
domain = "throughthelines.org"
tagline = "Every congressional district your address has lived under."
repo_url = "https://github.com/seankim658/throughthelines"

[paths]
# Config files
config_dir = "{repo_root}/config/"
request_filename = "request.toml"
sources_filename = "sources.toml"

# Data
raw_dir = "{repo_root}/data/raw/"
# Provider neutral parent for all district-geometry sources
district_geometry_dir = "{repo_root}/data/raw/district_geometry"
lewis_dir = "{repo_root}/data/raw/district_geometry/lewis"
voteview_dir = "{repo_root}/data/raw/voteview/"
census_dir = "{repo_root}/data/raw/census"
tabblock_dir = "{repo_root}/data/raw/census/tabblock/"
bef_dir = "{repo_root}/data/raw/census/bef/"
fetch_state_dir = "{repo_root}/data/raw/fetch_state/"

# Plans
plans_dir = "{repo_root}/data/plans/"

# Derived (build artifacts)
derived_dir = "{repo_root}/data/derived/"
stitched_dir = "{repo_root}/data/derived/stitched"
members_file = "{repo_root}/data/derived/members.json"
block_lookup_dir = "{repo_root}/data/derived/block_lookup/"
tiles_dir = "{repo_root}/data/derived/tiles/"
basemap_file = "{repo_root}/data/derived/basemaps/basemap.pmtiles"
plan_index_file = "{repo_root}/data/derived/plan_index.json"
manifest_file = "{repo_root}/data/derived/manifest.json"

[scope]
congress_start = 107
congress_end = 120
planned = ["PA", "TX", "VA"]

[scope.chambers]
NC = ["congressional"]
