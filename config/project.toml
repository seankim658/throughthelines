schema_version = 1

[project]
name = "Through the Lines"
domain = "throughthelines.org"
tagline = "Every congressional district your address has lived under."
repo_url = "https://github.com/seankim658/throughthelines"

[paths]
# Config files
config_dir = "{repo_root}/config/"
request_filename = "request.toml"
sources_filename = "sources.toml"

# Raw inputs
raw_dir = "{repo_root}/data/raw/"
district_geometry_dir = "{raw_dir}/district_geometry"
lewis_dir = "{district_geometry_dir}/lewis"
voteview_dir = "{raw_dir}/voteview/"
census_dir = "{raw_dir}/census"
tabblock_dir = "{census_dir}/tabblock/"
bef_dir = "{census_dir}/bef/"
fetch_state_dir = "{raw_dir}/fetch_state/"

# Plans
plans_dir = "{repo_root}/data/plans/"

# Derived (build artifacts)
derived_dir = "{repo_root}/data/derived/"
stitched_dir = "{derived_dir}/stitched"
members_file = "{derived_dir}/members.json"
block_lookup_dir = "{derived_dir}/block_lookup"
tiles_dir = "{derived_dir}/tiles"
basemap_file = "{derived_dir}/basemaps/basemap.pmtiles"
plan_index_file = "{derived_dir}/plan_index.json"
manifest_file = "{derived_dir}/manifest.json"

[scope]
congress_start = 107
congress_end = 120
planned = ["PA", "TX", "VA"]

[scope.chambers]
NC = ["congressional"]
